<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>cc_multichar</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        cursor: crosshair;
      }
      #catcher {
        position: fixed;
        inset: 0;
        background: transparent;
        display: none;
      }
      #catcher.open { display: block; }
    </style>
  </head>
  <body>
    <div id="catcher"></div>
    <script>
      const catcher = document.getElementById('catcher');

      function post(name, data = {}) {
        return fetch(`https://${GetParentResourceName()}/${name}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
      }

      catcher.addEventListener('click', () => { post('click'); });

      window.addEventListener('message', (e) => {
        const msg = e.data || {};
        if (msg.action === 'open')  catcher.classList.add('open');
        if (msg.action === 'close') catcher.classList.remove('open');
      });

      post('ready');
    </script>
  </body>
</html>
